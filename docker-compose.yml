# docker-compose.yml — PRODUCTION
# Usage: docker compose up -d
# Prerequisites: create .env file from .env.example

version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: appgen_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-ai_app_generator}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ai_app_generator}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appgen_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      PORT:         4000
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${DB_NAME:-ai_app_generator}
      DB_USER:      ${DB_USER:-postgres}
      DB_PASSWORD:  ${DB_PASSWORD}
      DB_POOL_MAX:  ${DB_POOL_MAX:-20}
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES:  ${JWT_EXPIRES:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    networks:
      - internal
    # Backend is NOT exposed to the host — Nginx proxies /api to it
    expose:
      - "4000"

  # ── Frontend (Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appgen_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - internal

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  internal:
    driver: bridge
