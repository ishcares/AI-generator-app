# docker-compose.dev.yml — DEVELOPMENT WITH HOT RECOGNITION
# Usage: docker compose -f docker-compose.dev.yml up --build
# Features:
#   - Volume mounting for instant live reloading
#   - Exposed database port (5432) for host DB tool access
#   - Express live reload via nodemon
#   - Vite host access for hot module replacement

version: '3.9'

services:
  # ── PostgreSQL (Exposed for host connection) ────────────────
  postgres:
    image: postgres:16-alpine
    container_name: appgen_db_dev
    restart: unless-stopped
    ports:
      - "5432:5432" # Accessible on host
    environment:
      POSTGRES_DB:       ${DB_NAME:-ai_app_generator}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ai_app_generator}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend (Volume-mounted for nodemon hot-reload) ──────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps # Build up to dependency stage to avoid copying static code
    container_name: appgen_backend_dev
    restart: unless-stopped
    command: npm run dev
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:     development
      PORT:         4000
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${DB_NAME:-ai_app_generator}
      DB_USER:      ${DB_USER:-postgres}
      DB_PASSWORD:  ${DB_PASSWORD:-postgres}
      JWT_SECRET:   ${JWT_SECRET:-dev_jwt_secret_change_in_production_please}
      JWT_EXPIRES:  7d
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app # Mount host code
      - /app/node_modules # Do not overwrite container node_modules with host
    networks:
      - dev_network

  # ── Frontend (Volume-mounted for Vite HMR) ───────────────────
  frontend:
    image: node:20-alpine
    container_name: appgen_frontend_dev
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npx vite --host"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:4000/api
    volumes:
      - ./frontend:/app # Mount host code
      - /app/node_modules # Keep node_modules isolated
    networks:
      - dev_network

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data_dev:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  dev_network:
    driver: bridge
